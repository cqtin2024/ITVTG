<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  padding: 15px;
  background: #020617;
  text-align: center;
  color: #38bdf8;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.match {
  background: #1e293b;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

.teams {
  font-weight: bold;
}

.meta {
  color: #94a3b8;
  font-size: 13px;
}
</style>
</head>

<body>

<header>⚽ World Cup 2026</header>

<div class="container" id="app">
Loading...
</div>

<script>

const WORKER = "https://raspy-sun-012e.cqtin-2024.workers.dev/?url=";
const API = "https://wheniskickoff.com/data/v1/matches.json";

async function loadData() {
  try {
    const res = await fetch(WORKER + encodeURIComponent(API));

    const text = await res.text();

    // ✅ fix lỗi HTML (nếu bị block)
    if (text.startsWith("<")) {
      throw new Error("API trả HTML (bị block)");
    }

    const json = JSON.parse(text);
    const matches = json.data;

    document.getElementById("app").innerHTML =
      matches.map(m => `
        <div class="match">
          <div class="teams">${m.home_name} vs ${m.away_name}</div>
          <div class="meta">
            📅 ${m.date} | ⏰ ${m.time_utc}
          </div>
          <div class="meta">
            🏆 Group ${m.group}
          </div>
        </div>
      `).join("");

  } catch (err) {
    console.error(err);

    document.getElementById("app").innerHTML =
      "❌ Lỗi tải dữ liệu<br><br>" + err;
  }
}

loadData();

</script>

</body>
</html>
