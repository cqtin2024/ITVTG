<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC 2026 FINAL</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

header{
  text-align:center;
  padding:12px;
  font-size:20px;
  color:#38bdf8;
}

.tabs{
  display:flex;
}
.tabs button{
  flex:1;
  padding:10px;
  border:none;
  background:#1e293b;
  color:white;
}
.tabs .active{
  background:#38bdf8;
}

.match{
  background:#1e293b;
  margin:10px;
  padding:10px;
  border-radius:8px;
}

.live{ border-left:4px solid red; }
.finished{ border-left:4px solid #22c55e; }

.teams{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.score{
  text-align:center;
  font-size:18px;
  margin:5px 0;
}

.meta{
  font-size:12px;
  color:#94a3b8;
  text-align:center;
}

</style>
</head>

<body>

<header>⚽ WC 2026 LIVE FINAL</header>

<div class="tabs">
<button onclick="setTab('live')" class="active">🔴 LIVE</button>
<button onclick="setTab('all')">📅 ALL</button>
</div>

<div id="app">Loading...</div>

<script>

// ===== API =====
const API = "https://sportscore.com/api/widget/matches/?sport=football&limit=50";

let matches = [];
let tab = "live";

// ===== LOAD DATA =====
async function load(){
  try{
    const res = await fetch(API);
    const json = await res.json();

    console.log("DATA:", json);

    matches = json.matches || [];

    render();

  }catch(err){
    document.getElementById("app").innerHTML =
      "❌ Error loading data";
  }
}

// ===== STATUS CLASS =====
function getClass(m){
  if(m.status === "LIVE") return "live";
  if(m.status === "FT") return "finished";
  return "";
}

// ===== SAFE GET TEAM =====
function getHome(m){
  return m.teams?.home?.name || "Unknown";
}
function getAway(m){
  return m.teams?.away?.name || "Unknown";
}

// ===== SAFE SCORE =====
function getScore(m){
  return (m.home_score ?? 0) + " - " + (m.away_score ?? 0);
}

// ===== TIME FORMAT =====
function getTime(m){
  return m.minute ? m.minute + "'" : "";
}

// ===== RENDER =====
function render(){

  let list = matches;

  if(tab === "live"){
    list = matches.filter(m => m.status === "LIVE");
  }

  if(!list.length){
    document.getElementById("app").innerHTML =
      "Không có trận";
    return;
  }

  document.getElementById("app").innerHTML =
    list.map(m => `
      <div class="match ${getClass(m)}">

        <div class="teams">
          <div>${getHome(m)}</div>
          <div>${getAway(m)}</div>
        </div>

        <div class="score">
          ${getScore(m)}
        </div>

        <div class="meta">
          ${m.status} 
          ${getTime(m)}
        </div>

      </div>
    `).join("");
}

// ===== TAB =====
function setTab(t){
  tab = t;

  document.querySelectorAll(".tabs button")
    .forEach(b => b.classList.remove("active"));

  event.target.classList.add("active");

  render();
}

// ===== AUTO REFRESH =====
setInterval(load, 30000);

// ===== INIT =====
load();

</script>

</body>
</html>
