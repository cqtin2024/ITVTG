<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WC 2026 Bracket</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#020617;
  color:white;
}

/* HEADER */
h1{
  text-align:center;
  padding:10px;
  color:#38bdf8;
}

/* BRACKET */
.bracket{
  display:flex;
  overflow-x:auto;
  padding:10px;
}

/* ROUND */
.round{
  min-width:220px;
  margin-right:10px;
}

/* MATCH */
.match{
  background:#1e293b;
  margin-bottom:12px;
  padding:8px;
  border-radius:8px;
}

/* TEAM */
.team{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:3px 0;
}

.team img{
  width:18px;
  margin-right:5px;
}

/* WINNER */
.win{
  color:#22c55e;
  font-weight:bold;
}

.title{
  text-align:center;
  margin-bottom:6px;
}

</style>
</head>

<body>

<h1>⚽ WC 2026 Bracket</h1>

<div id="bracket" class="bracket"></div>

<script>

let data;

// ===== FLAG =====
function flag(name){
  const map={
    "USA":"us","Japan":"jp","Mexico":"mx","Canada":"ca",
    "Brazil":"br","France":"fr","Germany":"de","Spain":"es"
  };
  return `https://flagcdn.com/w40/${map[name]?.toLowerCase()}.png`;
}

// ===== LOAD =====
async function init(){
  const res = await fetch("./data.json");
  data = await res.json();

  render();
}

// ===== BUILD RANK =====
function buildRank(){
  let groups = {};

  for(let g in data.groups){

    let table={};

    data.groups[g].forEach(t=>table[t]={pts:0});

    data.matches
      .filter(m=>m.group===g && m.home_score!=null)
      .forEach(m=>{
        if(m.home_score>m.away_score) table[m.home].pts+=3;
        else if(m.home_score<m.away_score) table[m.away].pts+=3;
        else{
          table[m.home].pts++;
          table[m.away].pts++;
        }
      });

    groups[g]=Object.entries(table)
      .sort((a,b)=>b[1].pts-a[1].pts)
      .map(x=>x[0]);
  }

  return groups;
}

// ===== RESOLVE TEAM =====
function resolve(k, rank){
  if(k[0]==="1") return rank[k[1]][0];
  if(k[0]==="2") return rank[k[1]][1];
  return k;
}

// ===== RENDER ROUND =====
function renderRound(title, matches, rank){
  return `
    <div class="round">
      <div class="title">${title}</div>
      ${matches.map(m=>{
        const h = resolve(m.home, rank);
        const a = resolve(m.away, rank);

        return `
          <div class="match">
            <div class="team">
              <span>${flag(h)}${h}</span>
              <span>-</span>
            </div>
            <div class="team">
              <span>${flag(a)}${a}</span>
              <span>-</span>
            </div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

// ===== MAIN RENDER =====
function render(){

  const rank = buildRank();

  const bracketHTML = 
    renderRound("Round 16", data.knockout.R16, rank) +
    renderRound("Quarter", data.knockout.QF || [], rank) +
    renderRound("Semi", data.knockout.SF || [], rank) +
    renderRound("Final", data.knockout.FINAL || [], rank);

  document.getElementById("bracket").innerHTML = bracketHTML;
}

init();

</script>

</body>
</html>
