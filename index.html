<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  color:#38bdf8;
}

/* TAB */
.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
}

.tabs button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

.tabs .active{
  background:#38bdf8;
}

/* CONTAINER */
.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

/* MATCH */
.match{
  background:rgba(30,41,59,0.6);
  backdrop-filter:blur(6px);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  transition:.2s;
}

.match:hover{
  transform:scale(1.02);
  background:#334155;
}

.today{
  border-left:4px solid #22c55e;
}

.teams{
  font-weight:bold;
}

.meta{
  font-size:13px;
  color:#94a3b8;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

/* LOADING */
.loading{
  text-align:center;
  color:#94a3b8;
}
</style>
</head>

<body>

<header>⚽ World Cup 2026</header>

<div class="tabs">
<button onclick="setTab('all')" class="active">Tất cả</button>
<button onclick="setTab('today')">Hôm nay</button>
<button onclick="setTab('search')">Tìm kiếm</button>
</div>

<div class="container">

<input id="search" placeholder="🔍 Nhập tên đội..." style="display:none">

<div id="app" class="loading">Loading...</div>

</div>

<script>

const WORKER = "https://raspy-sun-012e.cqtin-2024.workers.dev/?url=";
const API = "https://wheniskickoff.com/data/v1/matches.json";

let matches = [];
let currentTab = "all";

// ===== LOAD DATA =====
async function loadData(){
  try{
    const res = await fetch(WORKER + encodeURIComponent(API));
    const text = await res.text();

    if(text.startsWith("<")) throw "API bị block";

    const json = JSON.parse(text);
    matches = json.data;

    render();

  }catch(e){
    document.getElementById("app").innerHTML = "❌ Lỗi tải dữ liệu<br>"+e;
  }
}

// ===== FORMAT TIME =====
function formatTime(date,time){
  const d = new Date(date+"T"+time+"Z");
  return d.toLocaleString("vi-VN");
}

// ===== TODAY =====
function isToday(date){
  return new Date().toISOString().slice(0,10) === date;
}

// ===== TAB SWITCH =====
function setTab(tab){
  currentTab = tab;

  document.querySelectorAll(".tabs button")
    .forEach(b=>b.classList.remove("active"));

  event.target.classList.add("active");

  document.getElementById("search").style.display =
    tab==="search" ? "block" : "none";

  render();
}

// ===== RENDER =====
function render(){

  let data = matches;

  if(currentTab==="today"){
    data = data.filter(m=>isToday(m.date));
  }

  if(currentTab==="search"){
    const k = document.getElementById("search").value.toLowerCase();

    data = data.filter(m =>
      m.home_name.toLowerCase().includes(k) ||
      m.away_name.toLowerCase().includes(k)
    );
  }

  if(!data.length){
    document.getElementById("app").innerHTML="Không có dữ liệu";
    return;
  }

  document.getElementById("app").innerHTML =
    data.map(m=>`
      <div class="match ${isToday(m.date) ? 'today' : ''}">
        <div class="teams">
          ${m.home_name} 🇻🇸 ${m.away_name}
        </div>

        <div class="meta">
          📅 ${formatTime(m.date,m.time_utc)}
        </div>

        <div class="meta">
          🏆 Bảng ${m.group}
        </div>
      </div>
    `).join("");
}

// ===== SEARCH =====
document.getElementById("search").addEventListener("input", render);

// ===== INIT =====
loadData();

</script>

</body>
</html>
