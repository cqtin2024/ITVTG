<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WC 2026 FINAL</title>

<style>
body{background:#020617;color:white;font-family:sans-serif;margin:0}
header{text-align:center;padding:12px;color:#38bdf8;font-size:20px}

.tabs{display:flex}
.tabs button{flex:1;padding:10px;border:none;background:#1e293b;color:white}
.tabs .active{background:#38bdf8}

.match{background:#1e293b;margin:8px;padding:10px;border-radius:8px}
.live{border-left:4px solid red}
.finished{border-left:4px solid #22c55e}

.teams{display:flex;justify-content:space-between}
.meta{font-size:12px;color:#94a3b8}

.table-row{display:flex;justify-content:space-between;background:#1e293b;margin:5px;padding:6px}
</style>
</head>

<body>

<header>⚽ WC 2026 LIVE</header>

<div class="tabs">
<button onclick="setTab('live')" class="active">🔴 LIVE</button>
<button onclick="setTab('all')">📅 ALL</button>
<button onclick="setTab('table')">🏆 TABLE</button>
</div>

<div id="app">Loading...</div>

<script>

// ✅ API free (live + standings)
const LIVE_API = "https://sportscore.com/api/widget/matches/?sport=football&limit=30";
const TABLE_API = "https://sportscore.com/api/widget/standings/?sport=football&slug=worldcup";

let data=[];
let table=[];
let tab="live";

// ===== LOAD =====
async function load(){
  const res = await fetch(LIVE_API);
  const json = await res.json();

  data = json.matches || [];

  const res2 = await fetch(TABLE_API);
  const json2 = await res2.json();
  table = json2.standings || [];

  render();
}

// ===== STATUS =====
function getClass(m){
  if(m.status==="LIVE") return "live";
  if(m.status==="FT") return "finished";
  return "";
}

// ===== RENDER =====
function render(){

  if(tab==="table"){
    document.getElementById("app").innerHTML =
      table.map(t=>`
        <div class="table-row">
          <span>${t.team}</span>
          <span>${t.points}</span>
        </div>
      `).join("");
    return;
  }

  let list = data;

  if(tab==="live"){
    list = data.filter(m=>m.status==="LIVE");
  }

  document.getElementById("app").innerHTML =
    list.map(m=>`
      <div class="match ${getClass(m)}">

        <div class="teams">
          <span>${m.home_team}</span>
          <span>${m.away_team}</span>
        </div>

        <div>
          ${m.home_score} - ${m.away_score}
        </div>

        <div class="meta">
          ${m.status} | ${m.minute || ""}
        </div>

      </div>
    `).join("");
}

// ===== TAB =====
function setTab(t){
  tab=t;

  document.querySelectorAll(".tabs button")
    .forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  render();
}

// ✅ auto refresh mỗi 30s (live)
setInterval(load,30000);

load();

</script>

</body>
</html>
